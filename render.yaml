# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: keel-cloud
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: KEEL_DB_PATH
        value: /data/keel.db
      - key: RUST_LOG
        value: info
    disk:
      name: keel-data
      mountPath: /data
      sizeGB: 1
