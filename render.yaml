# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: keel-cloud
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: KEEL_DB_PATH
        value: /data/keel.db
      - key: RUST_LOG
        value: info
      - key: KEEL_FREE_PROJECT_LIMIT
        value: "1"
      - key: KEEL_PRO_PROJECT_LIMIT
        value: "50"
      - key: KEEL_STRIPE_PAYMENT_LINK
        sync: false
      - key: KEEL_UPGRADE_CODES
        sync: false
    disk:
      name: keel-data
      mountPath: /data
      sizeGB: 1
