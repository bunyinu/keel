<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keel — Dashboard</title>
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Keel</a>
    <nav>
      <a href="/">Home</a>
      <a href="/new">New project</a>
      <a href="/login">Sign in</a>
      <a href="/pricing">Pricing</a>
      <a href="/trust">Trust</a>
    </nav>
  </header>

  <main class="page" id="content" style="display:none">
    <h1 id="title">Project dashboard</h1>
    <p class="dashboard-meta">Project <code>__PROJECT_ID__</code> · <span id="updated"></span></p>
    <div class="dashboard-actions">
      <a href="/dashboard/__PROJECT_ID__/edit">Edit goal</a>
      · <a href="#" id="signout">Sign out</a>
    </div>
    <div class="card">
      <h2>Connect your repo</h2>
      <pre id="connect-cmd"></pre>
    </div>
    <h2>Snapshot</h2>
    <pre id="snapshot"></pre>
  </main>

  <p id="loading" class="page muted">Loading…</p>
  <p id="error" class="page err" style="display:none"></p>

  <script>
    const projectId = "__PROJECT_ID__";
    const storageKey = "keel_api_key_" + projectId;
    const loginUrl = "/login?project=" + encodeURIComponent(projectId);

    function signOut() {
      localStorage.removeItem(storageKey);
      location.href = loginUrl;
    }

    async function load() {
      const key = localStorage.getItem(storageKey);
      if (!key) {
        location.replace(loginUrl);
        return;
      }
      const res = await fetch("/api/projects/" + projectId, {
        headers: { Authorization: "Bearer " + key },
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem(storageKey);
        location.replace(loginUrl);
        return;
      }
      if (!res.ok) {
        document.getElementById("loading").style.display = "none";
        const err = document.getElementById("error");
        err.style.display = "block";
        err.textContent = "Could not load project (" + res.status + ").";
        return;
      }
      const data = await res.json();
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("title").textContent = data.name || "Project dashboard";
      document.getElementById("updated").textContent = "updated " + (data.updated_at || "");
      document.getElementById("snapshot").textContent = data.snapshot || "(empty)";
      const base = location.origin;
      document.getElementById("connect-cmd").textContent =
        "npm install -g @keel-agent/cli\n" +
        "keel cloud link --url " + base + " --project " + projectId + " --key " + key + "\n" +
        "cd your-repo && keel onboard \"your task\" --accept \"tests pass\"";
      document.getElementById("signout").onclick = (e) => { e.preventDefault(); signOut(); };
    }

    load();
  </script>
</body>
</html>
