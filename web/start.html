<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keel Cloud</title>
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Keel</a>
    <nav>
      <a href="/">Home</a>
      <a href="/start" class="active">Account</a>
      <a href="/pricing">Pricing</a>
      <a href="/trust">Trust</a>
    </nav>
  </header>

  <main class="page page-narrow">
    <h1>Keel Cloud account</h1>
    <p class="lead">Create an account, then add projects under it. Your account key is how you come back.</p>

    <div class="card">
      <h2 style="margin:0 0 1rem;font-size:1.1rem">Create account</h2>
      <label for="account-name">Your name or team</label>
      <input id="account-name" type="text" placeholder="e.g. Ada, Acme eng" autocomplete="name" />
      <button type="button" class="btn primary" id="create-account" style="margin-top:1rem;width:100%">Create account</button>
      <p id="create-status" class="muted" style="margin-top:1rem"></p>
    </div>

    <div class="card" style="margin-top:1.5rem">
      <h2 style="margin:0 0 1rem;font-size:1.1rem">Already have an account?</h2>
      <label for="account-key">Account key</label>
      <input id="account-key" type="password" placeholder="keel_team_…" autocomplete="off" />
      <button type="button" class="btn secondary" id="open-account" style="margin-top:1rem;width:100%">Open my account</button>
      <p id="open-status" class="muted" style="margin-top:1rem"></p>
    </div>
  </main>

  <script>
    window.KEEL_CREATE_SECRET = "__KEEL_CREATE_SECRET__";
    const createSecret = window.KEEL_CREATE_SECRET || "";

    const saved = localStorage.getItem("keel_account");
    if (saved) {
      try {
        if (JSON.parse(saved).license) location.replace("/account");
      } catch (_) {}
    }

    function saveAccount(team) {
      localStorage.setItem("keel_account", JSON.stringify({
        id: team.id,
        name: team.name,
        license: team.license || team.account_key,
        plan: team.plan,
      }));
    }

    async function verifyAccountKey(key) {
      const res = await fetch("/api/teams/projects", {
        headers: { Authorization: "Bearer " + key },
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data.team;
    }

    document.getElementById("create-account").onclick = async () => {
      const name = document.getElementById("account-name").value.trim();
      const st = document.getElementById("create-status");
      st.className = "muted";
      if (!name) { st.textContent = "Enter a name for your account"; st.className = "err"; return; }
      const headers = { "Content-Type": "application/json" };
      if (createSecret) headers["X-Keel-Create-Secret"] = createSecret;
      st.textContent = "Creating…";
      const res = await fetch("/api/teams", {
        method: "POST",
        headers,
        body: JSON.stringify({ name }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        st.textContent = data.error || "Could not create account";
        st.className = "err";
        return;
      }
      sessionStorage.setItem("keel_show_account_key", data.account_key);
      saveAccount({ id: data.id, name: data.name, license: data.account_key, plan: data.plan });
      location.href = "/account";
    };

    document.getElementById("open-account").onclick = async () => {
      const key = document.getElementById("account-key").value.trim();
      const st = document.getElementById("open-status");
      st.className = "muted";
      if (!key) { st.textContent = "Enter your account key"; st.className = "err"; return; }
      st.textContent = "Opening…";
      const team = await verifyAccountKey(key);
      if (!team) {
        st.textContent = "Invalid account key";
        st.className = "err";
        return;
      }
      saveAccount(team);
      location.href = "/account";
    };
  </script>
</body>
</html>
