<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keel — Edit goal</title>
  <link rel="stylesheet" href="/site.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Keel</a>
    <nav>
      <a href="/">Home</a>
      <a href="/new">New project</a>
      <a href="/login">Sign in</a>
      <a href="/pricing">Pricing</a>
      <a href="/trust">Trust</a>
    </nav>
  </header>

  <main class="page page-narrow" id="editor" style="display:none">
    <h1 id="heading">Edit goal</h1>
    <p class="dashboard-meta">Project <code>__PROJECT_ID__</code></p>
    <label for="title">Goal</label>
    <input id="title" type="text" placeholder="What are you building?" />
    <label for="step">Current step</label>
    <input id="step" type="text" placeholder="Optional" />
    <label for="acceptance">Acceptance criteria <span class="muted">(one per line)</span></label>
    <textarea id="acceptance"></textarea>
    <label for="constraints">Constraints <span class="muted">(one per line)</span></label>
    <textarea id="constraints"></textarea>
    <div class="cta-row">
      <button type="button" class="btn primary" id="save">Save goal</button>
      <a class="btn secondary" href="/dashboard/__PROJECT_ID__">Back to dashboard</a>
    </div>
    <p id="status" class="muted"></p>
  </main>

  <p id="loading" class="page muted">Loading…</p>

  <script>
    const projectId = "__PROJECT_ID__";
    const storageKey = "keel_api_key_" + projectId;
    const loginUrl = "/login?project=" + encodeURIComponent(projectId) +
      "&next=" + encodeURIComponent("/dashboard/" + projectId + "/edit");
    const status = document.getElementById("status");

    function lines(id) {
      return document.getElementById(id).value.split("\n").map(s => s.trim()).filter(Boolean);
    }

    async function loadGoal() {
      const key = localStorage.getItem(storageKey);
      if (!key) { location.replace(loginUrl); return; }
      const res = await fetch("/api/projects/" + projectId, {
        headers: { Authorization: "Bearer " + key },
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem(storageKey);
        location.replace(loginUrl);
        return;
      }
      if (!res.ok) {
        document.getElementById("loading").textContent = "Could not load project.";
        return;
      }
      const data = await res.json();
      const g = data.state?.goal || {};
      document.getElementById("loading").style.display = "none";
      document.getElementById("editor").style.display = "block";
      document.getElementById("heading").textContent = "Edit goal — " + (data.name || "project");
      document.getElementById("title").value = g.title || "";
      document.getElementById("step").value = data.state?.progress?.current_step || "";
      document.getElementById("acceptance").value = (g.acceptance || []).join("\n");
      document.getElementById("constraints").value = (g.constraints || []).join("\n");
    }

    document.getElementById("save").onclick = async () => {
      const key = localStorage.getItem(storageKey);
      if (!key) { location.replace(loginUrl); return; }
      const body = {
        title: document.getElementById("title").value,
        step: document.getElementById("step").value,
        acceptance: lines("acceptance"),
        constraints: lines("constraints"),
      };
      const res = await fetch("/api/projects/" + projectId + "/goal", {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + key },
        body: JSON.stringify(body),
      });
      const raw = await res.text();
      if (!res.ok) {
        status.textContent = "Save failed: " + res.status + " " + raw;
        status.className = "err";
        return;
      }
      status.textContent = "Saved. Run keel cloud pull in your repo to sync locally.";
      status.className = "ok";
    };

    loadGoal();
  </script>
</body>
</html>
